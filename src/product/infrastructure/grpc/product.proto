
syntax = "proto3";

package product;

service ProductService {
  rpc FindOne (ProductById) returns (Product) {}
  rpc List (EmptyRequest) returns (ProductList) {}
  rpc Update (Product) returns (Product) {}
  rpc Create (CreateProduct) returns (Product) {}
  rpc Remove (ProductById) returns (EmptyRequest) {}
}

message EmptyRequest {}

message ProductById {
  string id = 1;
}

message Product {
  string _id = 1;
  string name = 2;
  string description = 3;
  int32 price = 4;
}

message ProductList {
  repeated Product products = 1;
}

message CreateProduct {
  string name = 1;
  string description = 2;
  int32 price = 3;
}
